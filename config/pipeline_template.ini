[paths]
# Working root for videos/artifacts.
# Accepts absolute path (e.g. /mnt/DOCS/ab-work) or relative to project root (e.g. data, data/projeto-a).
# Under this root, the pipeline ensures these folders exist:
#   exec      -> processing workspace (inputs to workflows/exec.sh)
#   done      -> completed bundles moved by workflows/exec.sh
#   published -> manual post-publication destination
#   remux     -> remux outputs moved by workflows/remux.sh
data_root_relative = /your/path/here

[pipeline]
# 1 = reuse valid artifacts and resume from first invalid step
resume_mode = 1
# 0 = do not archive existing artifacts at start (recommended for resumable runs)
archive_on_start = 0
