[paths]
# Working root for videos/artifacts.
# Accepts absolute path (e.g. /mnt/DOCS/ab-work) or relative to project root (e.g. data, data/projeto-a).
# Under this root, the pipeline ensures these folders exist:
#   exec      -> processing workspace and generated artifacts, including remux outputs
#   published -> manual post-publication destination
workdir = /your/path/here
# Legacy alias kept for transition only.
data_root_relative = /your/path/here

[pipeline]
# 1 = reuse valid artifacts and resume from first invalid step
resume_mode = 1

[api_keys]
# Centralized API keys.
youtube_data_api_key = your_youtube_data_api_key_here
gemini_api_key = your_gemini_api_key_here

# Reserved placeholders for future integrations.
openai_api_key =
anthropic_api_key =
deepseek_api_key =

[models]
gemini_model = gemini-1.5-flash
