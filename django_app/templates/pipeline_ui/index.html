{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pipeline Local Webapp</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: #f4f7f8; color: #173026; }
    .container { width: min(1280px, 96vw); margin: 18px auto; }
    .top { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .tabs { display: flex; gap: 8px; margin: 12px 0 14px; border-bottom: 1px solid #d6e2dd; }
    .tab-btn {
      border: 1px solid #c7d6d0;
      border-bottom: 0;
      border-radius: 12px 12px 0 0;
      padding: 10px 16px;
      background: #edf6f3;
      color: #34554b;
      font-weight: 800;
      cursor: pointer;
      margin-bottom: -1px;
    }
    .tab-btn.is-active { background: #fff; color: #173026; border-color: #b8cdc5; }
    .tab-panel { margin-top: 0; }
    .btn { border: 0; border-radius: 8px; padding: 9px 12px; font-weight: 700; cursor: pointer; }
    .scan { background: #d8e7ff; color: #1f3c7f; }
    .add { background: #f1dfb6; color: #6d4a00; }
    .delete { background: #f8d9d6; color: #8a2318; }
    .run { background: #117a62; color: #fff; }
    .stop { background: #b5382b; color: #fff; }
    .worker-pill { border-radius: 999px; padding: 5px 10px; font-size: .82rem; font-weight: 700; border: 1px solid #c6dcd3; background: #e9f4ef; color: #2c584a; }
    .worker-online { background: #d9f5e8; color: #13613f; border-color: #97d7bb; }
    .worker-offline { background: #ffe5e1; color: #8a2318; border-color: #efb3ab; }
    .worker-unknown { background: #f3f4f6; color: #4f5962; border-color: #d6d9de; }
    .discovery-pill { border-radius: 999px; padding: 5px 10px; font-size: .82rem; font-weight: 700; border: 1px solid #c6dcd3; background: #eef3f7; color: #36505f; }
    .discovery-running { background: #fff4db; color: #7c4a03; border-color: #f2ca7f; }
    .discovery-done { background: #e7f8ee; color: #166534; border-color: #b7e4c7; }
    .discovery-idle { background: #f3f4f6; color: #4f5962; border-color: #d6d9de; }
    .global-phase-pill { border-radius: 999px; padding: 5px 10px; font-size: .82rem; font-weight: 700; border: 1px solid #c6dcd3; background: #edf6f3; color: #26483d; }
    .global-phase-active { background: #e8f2ff; color: #1e3a8a; border-color: #bfd7ff; }
    .global-phase-idle { background: #f3f4f6; color: #4f5962; border-color: #d6d9de; }
    .refresh-wrap { display: inline-flex; align-items: center; gap: 6px; }
    .refresh-wrap label { font-size: .8rem; color: #49655c; font-weight: 700; }
    .refresh-wrap select { width: auto; min-width: 120px; font-size: .78rem; padding: 4px 6px; }
    .hint { margin-left: auto; font-size: .9rem; color: #49655c; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #d6e2dd; }
    th, td { border-bottom: 1px solid #e2ece8; padding: 12px 9px; text-align: left; vertical-align: top; font-size: .88rem; }
    th { background: #edf6f3; position: sticky; top: 0; }
    .phase-col { min-width: 360px; }
    .select-col { width: 150px; min-width: 150px; }
    .select-cell { display: flex; align-items: center; gap: 8px; }
    .video-thumb {
      width: 96px;
      height: 54px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #ccd9e2;
      background: #eef3f7;
      flex-shrink: 0;
    }
    .video-thumb-clickable { cursor: zoom-in; transition: transform .12s ease, box-shadow .12s ease; }
    .video-thumb-clickable:hover { transform: scale(1.03); box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18); }
    .file-cell { min-width: 360px; }
    .file-head { display: flex; align-items: center; gap: 8px; }
    .file-icons { display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .file-icon { width: 16px; height: 16px; display: inline-block; vertical-align: middle; }
    .file-name { font-size: .94rem; font-weight: 700; color: #173026; }
    .title-line { margin-top: 4px; text-align: left; line-height: 1.4; }
    .title-label { font-weight: 700; color: #335348; }
    .title-text { color: #29473d; }
    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: .74rem;
      font-weight: 700;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .status-not-started { background: #f1f5f9; border-color: #cbd5e1; color: #334155; }
    .status-queued { background: #eaf2ff; border-color: #bfd7ff; color: #1d4e89; }
    .status-running { background: #fff4db; border-color: #f8d9a0; color: #7c4a03; }
    .status-completed { background: #e7f8ee; border-color: #b7e4c7; color: #166534; }
    .status-error { background: #fdecec; border-color: #f5b8b8; color: #991b1b; }
    .status-stopped { background: #f3e8ff; border-color: #d8b4fe; color: #6b21a8; }
    .status-skipped { background: #eef2f7; border-color: #d3dae6; color: #475569; }
    .status-unknown { background: #ff8a1f; border-color: #d66a00; color: #ffffff; }
    .phase-track { display: flex; align-items: flex-start; gap: 0; min-width: 320px; padding-top: 2px; }
    .phase-step { position: relative; flex: 1 1 0; display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; }
    .phase-step:not(:last-child)::after {
      content: "";
      position: absolute;
      top: 8px;
      left: calc(50% + 12px);
      right: calc(-50% + 12px);
      height: 2px;
      background: #d5dfdb;
      z-index: 0;
    }
    .phase-step.is-completed:not(:last-child)::after { background: #77c89a; }
    .phase-step.is-error:not(:last-child)::after { background: #ef9a9a; }
    .phase-step.is-running:not(:last-child)::after {
      background: linear-gradient(90deg, #f2c267 0%, #f7d99e 50%, #d5dfdb 100%);
    }
    .phase-dot {
      position: relative;
      z-index: 1;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #b7c6c1;
      background: #ffffff;
      box-sizing: border-box;
    }
    .phase-step.is-not-started .phase-dot { background: #ffffff; border-color: #cbd5e1; }
    .phase-step.is-queued .phase-dot { background: #d9e9ff; border-color: #7fb1ff; }
    .phase-step.is-running .phase-dot {
      background: #ffd37f;
      border-color: #d89114;
      box-shadow: 0 0 0 0 rgba(216, 145, 20, 0.45);
      animation: phase-pulse 1.5s infinite;
    }
    .phase-step.is-completed .phase-dot { background: #34b56a; border-color: #239150; }
    .phase-step.is-error .phase-dot { background: #e66a6a; border-color: #ba3f3f; }
    .phase-step.is-stopped .phase-dot { background: #b788f7; border-color: #8854d0; }
    .phase-step.is-skipped .phase-dot { background: #dbe4ea; border-color: #aab7c5; }
    .phase-step.is-unknown .phase-dot { background: #ff8a1f; border-color: #d66a00; }
    .phase-label { font-size: .66rem; font-weight: 700; color: #486258; letter-spacing: .02em; line-height: 1.15; }
    .phase-progress { font-size: .62rem; font-weight: 700; color: #6a7f76; line-height: 1; }
    .phase-step.is-running .phase-label { color: #7c4a03; }
    .phase-step.is-running .phase-progress { color: #7c4a03; }
    .phase-summary { margin-top: 8px; font-size: .76rem; color: #49655c; }
    @keyframes phase-pulse {
      0% { box-shadow: 0 0 0 0 rgba(216, 145, 20, 0.45); }
      70% { box-shadow: 0 0 0 8px rgba(216, 145, 20, 0); }
      100% { box-shadow: 0 0 0 0 rgba(216, 145, 20, 0); }
    }
    select { width: 100%; border: 1px solid #c1d2cc; border-radius: 7px; padding: 5px; font-size: .8rem; background: #fff; }
    .mono { font-family: ui-monospace, Menlo, monospace; font-size: .8rem; color: #4a5f58; }
    .translate-mode-note {
      margin-top: 6px;
      display: inline-block;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: .7rem;
      font-weight: 700;
      border: 1px solid #cfe0da;
      background: #eef7f3;
      color: #1f4f40;
      white-space: nowrap;
    }
    .translate-mode-note.warn {
      border-color: #f1c27c;
      background: #fff5e8;
      color: #8c4c09;
    }
    .tail-link { color: #1f5b99; text-decoration: underline; cursor: pointer; background: none; border: 0; padding: 0; font: inherit; }
    .file-cell-wrap { position: relative; padding-right: 42px; }
    .edit-launch {
      position: absolute;
      right: 4px;
      bottom: 4px;
      width: 30px;
      height: 30px;
      border: 1px solid #c7d6d0;
      border-radius: 999px;
      background: #f1f7f4;
      color: #1f5b4d;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
    }
    .edit-launch:hover { background: #e6f2ed; }
    .edit-launch:focus-visible,
    .field-clear:focus-visible,
    .overlay-save:focus-visible,
    .overlay-cancel:focus-visible { outline: 2px solid #5c9c8b; outline-offset: 2px; }
    .edit-overlay-body { padding: 16px; display: grid; gap: 12px; }
    .edit-grid { display: grid; gap: 12px; }
    .edit-field label { display: block; font-size: .84rem; font-weight: 700; color: #335348; margin-bottom: 5px; }
    .field-row { display: flex; gap: 8px; align-items: stretch; }
    .edit-field input {
      flex: 1 1 auto;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #c7d6d0;
      border-radius: 10px;
      padding: 11px 12px;
      font-size: .92rem;
    }
    .field-clear {
      flex: 0 0 auto;
      width: 36px;
      border: 1px solid #c7d6d0;
      border-radius: 10px;
      background: #f7faf8;
      color: #56746b;
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
    }
    .edit-actions { display: flex; justify-content: flex-end; gap: 8px; padding-top: 4px; }
    .overlay-save { background: #117a62; color: #fff; }
    .overlay-cancel { background: #e8eeec; color: #29473d; }
    .edit-error { min-height: 1.2em; font-size: .82rem; color: #a61b1b; }
    .overlay[hidden] { display: none; }
    .overlay { position: fixed; inset: 0; background: rgba(10, 20, 24, 0.52); display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 1000; }
    .overlay-card { width: min(920px, 94vw); max-height: 82vh; background: #fff; border-radius: 14px; border: 1px solid #cfe0da; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22); display: flex; flex-direction: column; }
    .overlay-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; border-bottom: 1px solid #dde9e4; }
    .overlay-title { font-size: .95rem; font-weight: 700; color: #173026; }
    .overlay-close { border: 0; background: #eef5f2; color: #173026; border-radius: 8px; padding: 7px 10px; cursor: pointer; font-weight: 700; }
    .overlay-body { padding: 0; overflow: auto; }
    .overlay-body.image-preview { padding: 12px; background: #f6faf8; display: flex; justify-content: center; }
    .preview-image { display: block; max-width: min(1200px, 92vw); max-height: 80vh; width: auto; height: auto; border-radius: 10px; border: 1px solid #d3e1db; background: #ffffff; }
    .overlay-pre { margin: 0; padding: 16px; font-family: ui-monospace, Menlo, monospace; font-size: .82rem; line-height: 1.45; white-space: pre-wrap; color: #203a31; background: #fbfdfc; }
    .download-form { padding: 16px; display: grid; gap: 10px; }
    .download-form label { font-size: .84rem; font-weight: 700; color: #335348; }
    .download-form input { width: 100%; box-sizing: border-box; border: 1px solid #c7d6d0; border-radius: 10px; padding: 11px 12px; font-size: .92rem; }
    .download-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .download-ok { background: #117a62; color: #fff; }
    .download-cancel { background: #e8eeec; color: #29473d; }
    .download-error { min-height: 1.2em; font-size: .82rem; color: #a61b1b; }
    .pager { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
    .pager-info { font-size: .88rem; color: #49655c; }
    .pager-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .pager-actions select { width: auto; min-width: 88px; }
    .btn.pager-btn { background: #edf6f3; color: #26483d; padding: 8px 10px; }
    .btn.pager-btn[disabled] { opacity: .5; cursor: default; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Pipeline Local Webapp</h2>
    <div class="tabs" role="tablist" aria-label="Pipeline tabs">
      <button class="tab-btn is-active" id="pipelineTabBtn" type="button" role="tab" aria-selected="true" aria-controls="pipelinePanel">Pipeline</button>
      <button class="tab-btn" id="libraryTabBtn" type="button" role="tab" aria-selected="false" aria-controls="libraryPanel">Library</button>
    </div>

    <section class="tab-panel" id="pipelinePanel" role="tabpanel" aria-labelledby="pipelineTabBtn">
      <div class="top">
        <button class="btn scan" id="scanBtn">Scan</button>
        <button class="btn run" id="runBtn">Start</button>
        <button class="btn add" id="addBtn">Add</button>
        <button class="btn delete" id="deleteBtn">Delete</button>
        <button class="btn stop" id="stopBtn">Stop</button>
        <span class="worker-pill worker-unknown" id="workerStatus">Worker: unknown</span>
        <span class="discovery-pill discovery-idle" id="discoveryStatus">Last discovery: never</span>
        <span class="global-phase-pill global-phase-idle" id="globalPhaseStatus">Fase global: idle</span>
        <span class="refresh-wrap">
          <label for="autoRefreshSelect">Auto-scan (sem recarregar pagina)</label>
          <select id="autoRefreshSelect" aria-label="Auto-scan interval">
            <option value="0">Desligado</option>
            <option value="15">15s</option>
            <option value="30">30s</option>
            <option value="45">45s</option>
            <option value="60">1 min</option>
            <option value="180">3 min</option>
            <option value="300">5 min</option>
            <option value="900" selected>15 min</option>
            <option value="1800">30 min</option>
          </select>
        </span>
        <span class="hint" id="pipelineHint">Selected: 0</span>
      </div>

      <div style="overflow:auto; max-height: 78vh; border:1px solid #d6e2dd;">
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="pipelineAll"></th>
              <th>File</th>
              <th class="phase-col">Phases</th>
              <th>Logs</th>
            </tr>
          </thead>
          <tbody id="pipelineTbody"></tbody>
        </table>
      </div>

      <div class="pager">
        <div class="pager-info" id="pipelinePagerInfo">0 registros</div>
        <div class="pager-actions">
          <label for="pipelinePageSize">Por pagina</label>
          <select id="pipelinePageSize" class="page-size-select">
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
          <button class="btn pager-btn" id="pipelinePrevPageBtn" type="button">Prev</button>
          <span class="pager-info" id="pipelinePageIndicator">Pagina 1 de 1</span>
          <button class="btn pager-btn" id="pipelineNextPageBtn" type="button">Next</button>
        </div>
      </div>
    </section>

    <section class="tab-panel" id="libraryPanel" role="tabpanel" aria-labelledby="libraryTabBtn" hidden>
      <div class="top">
        <button class="btn scan" id="libraryRefreshBtn">Refresh titles</button>
        <button class="btn run" id="restoreBtn">Restore</button>
        <button class="btn delete" id="libraryDeleteBtn">Delete</button>
        <span class="hint" id="libraryHint">Selected: 0</span>
      </div>

      <div style="overflow:auto; max-height: 78vh; border:1px solid #d6e2dd;">
        <table>
          <thead>
            <tr>
              <th><input type="checkbox" id="libraryAll"></th>
              <th>File</th>
            </tr>
          </thead>
          <tbody id="libraryTbody"></tbody>
        </table>
      </div>

      <div class="pager">
        <div class="pager-info" id="libraryPagerInfo">0 registros</div>
        <div class="pager-actions">
          <label for="libraryPageSize">Por pagina</label>
          <select id="libraryPageSize" class="page-size-select">
            <option value="10">10</option>
            <option value="25">25</option>
            <option value="50" selected>50</option>
            <option value="100">100</option>
          </select>
          <button class="btn pager-btn" id="libraryPrevPageBtn" type="button">Prev</button>
          <span class="pager-info" id="libraryPageIndicator">Pagina 1 de 1</span>
          <button class="btn pager-btn" id="libraryNextPageBtn" type="button">Next</button>
        </div>
      </div>
    </section>
  </div>

  <div class="overlay" id="logTailOverlay" hidden>
    <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="logTailTitle">
      <div class="overlay-head">
        <div class="overlay-title" id="logTailTitle">Log tail</div>
        <button class="overlay-close" id="logTailClose" type="button">Close</button>
      </div>
      <div class="overlay-body">
        <pre class="overlay-pre" id="logTailContent">Loading...</pre>
      </div>
    </div>
  </div>

  <div class="overlay" id="downloadOverlay" hidden>
    <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="downloadTitle">
      <div class="overlay-head">
        <div class="overlay-title" id="downloadTitle">Add YouTube link</div>
        <button class="overlay-close" id="downloadClose" type="button">Cancel</button>
      </div>
      <div class="overlay-body">
        <div class="download-form">
          <div>
            <label for="downloadUrl">YouTube link</label>
            <input id="downloadUrl" type="url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" spellcheck="false">
          </div>
          <div class="download-error" id="downloadError"></div>
          <div class="download-actions">
            <button class="btn download-cancel" id="downloadCancel" type="button">Cancel</button>
            <button class="btn download-ok" id="downloadOk" type="button">OK</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="thumbOverlay" hidden>
    <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="thumbTitle">
      <div class="overlay-head">
        <div class="overlay-title" id="thumbTitle">Thumbnail</div>
        <button class="overlay-close" id="thumbClose" type="button">Close</button>
      </div>
      <div class="overlay-body image-preview">
        <img id="thumbPreviewImage" class="preview-image" alt="Thumbnail preview">
      </div>
    </div>
  </div>

  <div class="overlay" id="editOverlay" hidden>
    <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="editTitle">
      <div class="overlay-head">
        <div class="overlay-title" id="editTitle">Editar item da Library</div>
        <button class="overlay-close" id="editClose" type="button">Cancelar</button>
      </div>
      <div class="overlay-body edit-overlay-body">
        <div class="edit-grid">
          <div class="edit-field">
            <label for="editYoutubeUrl">Link do YouTube</label>
            <div class="field-row">
              <input id="editYoutubeUrl" type="url" autocomplete="off" spellcheck="false">
              <button class="field-clear" id="clearYoutubeUrl" type="button" aria-label="Limpar link do YouTube">×</button>
            </div>
          </div>
          <div class="edit-field">
            <label for="editTitleOriginal">Título original</label>
            <div class="field-row">
              <input id="editTitleOriginal" type="text" autocomplete="off" spellcheck="false">
              <button class="field-clear" id="clearTitleOriginal" type="button" aria-label="Limpar título original">×</button>
            </div>
          </div>
          <div class="edit-field">
            <label for="editTitlePtBr">Título traduzido</label>
            <div class="field-row">
              <input id="editTitlePtBr" type="text" autocomplete="off" spellcheck="false">
              <button class="field-clear" id="clearTitlePtBr" type="button" aria-label="Limpar título traduzido">×</button>
            </div>
          </div>
        </div>
        <div class="edit-error" id="editError"></div>
        <div class="edit-actions">
          <button class="btn overlay-cancel" id="editCancel" type="button">Cancelar</button>
          <button class="btn overlay-save" id="editSave" type="button">Salvar</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const TAB_PIPELINE = 'pipeline';
    const TAB_LIBRARY = 'library';

    const pipelineTabBtn = document.getElementById('pipelineTabBtn');
    const libraryTabBtn = document.getElementById('libraryTabBtn');
    const pipelinePanel = document.getElementById('pipelinePanel');
    const libraryPanel = document.getElementById('libraryPanel');
    const pipelineTbody = document.getElementById('pipelineTbody');
    const libraryTbody = document.getElementById('libraryTbody');
    const pipelineHint = document.getElementById('pipelineHint');
    const libraryHint = document.getElementById('libraryHint');
    const pipelineAll = document.getElementById('pipelineAll');
    const libraryAll = document.getElementById('libraryAll');
    const workerStatusEl = document.getElementById('workerStatus');
    const discoveryStatusEl = document.getElementById('discoveryStatus');
    const globalPhaseStatusEl = document.getElementById('globalPhaseStatus');
    const autoRefreshSelect = document.getElementById('autoRefreshSelect');
    const pipelinePageSizeEl = document.getElementById('pipelinePageSize');
    const libraryPageSizeEl = document.getElementById('libraryPageSize');
    const pipelinePrevPageBtn = document.getElementById('pipelinePrevPageBtn');
    const libraryPrevPageBtn = document.getElementById('libraryPrevPageBtn');
    const pipelineNextPageBtn = document.getElementById('pipelineNextPageBtn');
    const libraryNextPageBtn = document.getElementById('libraryNextPageBtn');
    const pipelinePageIndicator = document.getElementById('pipelinePageIndicator');
    const libraryPageIndicator = document.getElementById('libraryPageIndicator');
    const pipelinePagerInfo = document.getElementById('pipelinePagerInfo');
    const libraryPagerInfo = document.getElementById('libraryPagerInfo');
    const logTailOverlay = document.getElementById('logTailOverlay');
    const logTailTitle = document.getElementById('logTailTitle');
    const logTailContent = document.getElementById('logTailContent');
    const logTailClose = document.getElementById('logTailClose');
    const downloadOverlay = document.getElementById('downloadOverlay');
    const downloadUrl = document.getElementById('downloadUrl');
    const downloadError = document.getElementById('downloadError');

    const selectedIdsByTab = {
      [TAB_PIPELINE]: new Set(),
      [TAB_LIBRARY]: new Set()
    };

    function selectionSetForTab(tab) {
      return selectedIdsByTab[tab] || new Set();
    }

    function syncSelectionWithItems() {
      const validIdsByTab = {
        [TAB_PIPELINE]: new Set(itemsForTab(TAB_PIPELINE).map((item) => Number(item.id))),
        [TAB_LIBRARY]: new Set(itemsForTab(TAB_LIBRARY).map((item) => Number(item.id)))
      };

      [TAB_PIPELINE, TAB_LIBRARY].forEach((tab) => {
        const selection = selectionSetForTab(tab);
        Array.from(selection).forEach((id) => {
          if (!validIdsByTab[tab].has(Number(id))) {
            selection.delete(Number(id));
          }
        });
      });
    }

    function pageSizeForTab(tab) {
      const select = tab === TAB_LIBRARY ? libraryPageSizeEl : pipelinePageSizeEl;
      return Number(select?.value || 50);
    }

    function normalizedDurationHms(value) {
      const raw = String(value || '').trim();
      if (!raw || raw === '--') {
        return '--:--:--';
      }

      if (/^\d{2}:\d{2}:\d{2}$/.test(raw)) {
        return raw;
      }
      return '--:--:--';
    }

    function itemTab(item) {
      return String(item?.storage_location || 'exec').toLowerCase() === TAB_LIBRARY ? TAB_LIBRARY : TAB_PIPELINE;
    }

    function itemsForTab(tab) {
      return items.filter((item) => itemTab(item) === tab);
    }

    function totalPages(tab) {
      const total = itemsForTab(tab).length;
      return Math.max(1, Math.ceil(total / pageSizeForTab(tab)));
    }

    function pageItems(tab) {
      const tabItems = itemsForTab(tab);
      const size = pageSizeForTab(tab);
      const currentPage = currentPageByTab[tab] || 1;
      const start = (currentPage - 1) * size;
      return tabItems.slice(start, start + size);
    }

    function syncPager(tab) {
      const tabItems = itemsForTab(tab);
      const total = tabItems.length;
      const pages = totalPages(tab);
      if (!currentPageByTab[tab]) {
        currentPageByTab[tab] = 1;
      }
      if (currentPageByTab[tab] > pages) {
        currentPageByTab[tab] = pages;
      }

      const currentPage = currentPageByTab[tab];
      const size = pageSizeForTab(tab);
      const start = total === 0 ? 0 : ((currentPage - 1) * size) + 1;
      const end = total === 0 ? 0 : Math.min(currentPage * size, total);
      const pagerInfoEl = tab === TAB_LIBRARY ? libraryPagerInfo : pipelinePagerInfo;
      const pageIndicatorEl = tab === TAB_LIBRARY ? libraryPageIndicator : pipelinePageIndicator;
      const prevBtn = tab === TAB_LIBRARY ? libraryPrevPageBtn : pipelinePrevPageBtn;
      const nextBtn = tab === TAB_LIBRARY ? libraryNextPageBtn : pipelineNextPageBtn;
      pagerInfoEl.textContent = `${total} registros | exibindo ${start}-${end}`;
      pageIndicatorEl.textContent = `Pagina ${currentPage} de ${pages}`;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= pages;
    }

    function selectedIds(tab) {
      return Array.from(selectionSetForTab(tab));
    }

    function updateHint(tab) {
      const panel = tab === TAB_LIBRARY ? libraryPanel : pipelinePanel;
      const hintEl = tab === TAB_LIBRARY ? libraryHint : pipelineHint;
      const allEl = tab === TAB_LIBRARY ? libraryAll : pipelineAll;
      const selection = selectionSetForTab(tab);
      hintEl.textContent = `Selected: ${selection.size}`;
      const visibleRows = Array.from(panel.querySelectorAll('.row-check'));
      const visibleChecked = visibleRows.filter((el) => selection.has(Number(el.dataset.id))).length;
      const totalVisible = visibleRows.length;
      allEl.checked = totalVisible > 0 && visibleChecked === totalVisible;
      allEl.indeterminate = visibleChecked > 0 && visibleChecked < totalVisible;
    }

    function statusBadge(label, className) {
      return `<span class="status-badge ${className}">${label}</span>`;
    }

    function phaseStateClass(className) {
      return String(className || '').replace(/^status-/, 'is-') || 'is-unknown';
    }

    function phasePercentFromStatus(status) {
      const className = String(status?.className || '').trim().toLowerCase();
      if (className === 'status-completed' || className === 'status-skipped') {
        return 100;
      }
      if (className === 'status-running') {
        return 5;
      }
      return 0;
    }

    function normalizedBucketPercent(value) {
      const num = Number(value);
      if (!Number.isFinite(num)) {
        return null;
      }
      const bounded = Math.max(0, Math.min(100, Math.floor(num)));
      return bounded >= 100 ? 100 : (Math.floor(bounded / 5) * 5);
    }

    function computePhasePercentSnapshot(statuses, progressByStep = null) {
      const fromLog = progressByStep && typeof progressByStep === 'object' ? progressByStep : {};

      const dlFromLog = normalizedBucketPercent(fromLog.download);
      const exFromLog = normalizedBucketPercent(fromLog.extract);
      const trFromLog = Math.max(
        normalizedBucketPercent(fromLog.transcribe) ?? 0,
        normalizedBucketPercent(fromLog.whisper) ?? 0
      );
      const tlFromLog = normalizedBucketPercent(fromLog.translate);
      const abFromLog = normalizedBucketPercent(fromLog.audiobook);
      const rxFromLog = normalizedBucketPercent(fromLog.remux);

      return {
        download: dlFromLog ?? phasePercentFromStatus(statuses.download),
        extract: exFromLog ?? phasePercentFromStatus(statuses.extract),
        transcribe: trFromLog > 0 ? trFromLog : phasePercentFromStatus(statuses.transcribe),
        translate: tlFromLog ?? phasePercentFromStatus(statuses.translate),
        audiobook: abFromLog ?? phasePercentFromStatus(statuses.audiobook),
        remux: rxFromLog ?? phasePercentFromStatus(statuses.remux)
      };
    }

    function renderPhaseTimeline(statuses, percentSnapshot) {
      const steps = [
        { key: 'download', label: 'DL', title: 'Download' },
        { key: 'extract', label: 'EX', title: 'Extract' },
        { key: 'transcribe', label: 'TR', title: 'Transcribe' },
        { key: 'translate', label: 'TL', title: 'Translate' },
        { key: 'audiobook', label: 'AB', title: 'Audiobook' },
        { key: 'remux', label: 'RX', title: 'Remux' }
      ];
      const runningStep = steps.find((step) => statuses[step.key]?.className === 'status-running');
      const summary = runningStep
        ? `Em execucao: ${runningStep.title}`
        : steps.find((step) => statuses[step.key]?.className === 'status-error')
          ? 'Ha fase com erro'
          : steps.every((step) => statuses[step.key]?.className === 'status-completed' || statuses[step.key]?.className === 'status-skipped')
            ? 'Fluxo concluido'
            : 'Aguardando proxima fase';

      const timeline = steps.map((step) => {
        const state = statuses[step.key] || { label: 'Unknown', className: 'status-unknown' };
        const stateClass = phaseStateClass(state.className);
        const stepPercent = Number(percentSnapshot?.[step.key] ?? 0);
        return `<div class="phase-step ${stateClass}" title="${step.title}: ${state.label}"><span class="phase-dot"></span><span class="phase-label">${step.label}</span><span class="phase-progress">${stepPercent}%</span></div>`;
      }).join('');

      return `<div class="phase-track">${timeline}</div><div class="phase-summary">${summary}</div>`;
    }

    function renderTitleLine(label, text) {
      const normalized = String(text || '').trim();
      if (!normalized) {
        return '';
      }
      return `<div class="title-line"><span class="title-label">${escapeHtml(label)}:</span> <span class="title-text">${escapeHtml(normalized)}</span></div>`;
    }

    function formatOriginalLanguage(value) {
      const raw = String(value || '').trim();
      if (!raw) {
        return '(Desconhecido)';
      }

      const lower = raw.toLowerCase();
      if (lower === 'auto' || lower === 'unknown') {
        return '(Desconhecido)';
      }

      return raw;
    }

    async function saveEditOverlay() {

      editError.textContent = '';
      editSave.disabled = true;
      try {
        const response = await fetch(`/api/videos/${editingItemId}/metadata`, {

          body: JSON.stringify({

            youtube_title_pt_br: normalizeInputValue(editTitlePtBr.value)

        const payload = await response.json().catch(() => null);
        if (!response.ok || !payload || !payload.ok) {
          throw new Error(payload?.error || `Falha ao salvar (${response.status}).`);
        }

        closeEditOverlay();
        await loadStatus(false);

        editError.textContent = String(error?.message || error || 'Falha ao salvar as alteracoes.');

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function lastLogLines(text, count = 20) {
      const lines = String(text || '').replace(/\r\n/g, '\n').split('\n');
      const trimmed = lines.filter((line, index, arr) => !(index === arr.length - 1 && line === ''));
      return trimmed.slice(-count).join('\n') || 'Log is empty.';
    }

    async function showLogTail(logUrl, fileName) {
      openLogTailOverlay(`Last 20 lines: ${fileName}`, 'Loading...');

      try {
        const response = await fetch(logUrl);
        if (!response.ok) {
          throw new Error(`Failed to load log (${response.status})`);
        }
        const text = await response.text();
        logTailContent.textContent = lastLogLines(text, 20);
      } catch (error) {
        logTailContent.textContent = `Could not load the log.\n${error.message}`;
      }
    }

    function buildDisplayStepMap(run) {
      const stepMap = new Map();

      (run?.steps || []).forEach((step) => {
        stepMap.set(step.step_name, step.status || 'pending');
      });

      return Object.fromEntries(orderedStepNames.map((stepName) => [stepName, stepMap.get(stepName) || 'pending']));
    }

    function nextStepIndexFromMap(stepMap) {
      for (let i = 0; i < orderedStepNames.length; i += 1) {
        const stepName = orderedStepNames[i];
        const rawStatus = String(stepMap[stepName] || 'pending').trim().toLowerCase();
        if (rawStatus !== 'success' && rawStatus !== 'skipped') {
          return i;
        }
      }
      return -1;
    }

    function renderGlobalPhaseStatusFromItems(allItems) {
      globalPhaseStatusEl.classList.remove('global-phase-active', 'global-phase-idle');

      const candidates = [];
      for (const item of allItems || []) {
        const run = item?.latest_run;
        const runStatus = String(run?.status || '').trim().toLowerCase();
        if (!['queued', 'running', 'stopping'].includes(runStatus)) {
          continue;
        }
        const stepMap = buildDisplayStepMap(run);
        const nextStepIndex = nextStepIndexFromMap(stepMap);
        if (nextStepIndex >= 0) {
          candidates.push({
            itemId: item.id,
            runStatus,
            nextStepIndex,
            nextStepName: orderedStepNames[nextStepIndex]
          });
        }
      }

      if (!candidates.length) {
        globalPhaseStatusEl.classList.add('global-phase-idle');
        globalPhaseStatusEl.textContent = 'Fase global: idle';
        return;
      }

      const globalStepIndex = Math.min(...candidates.map((c) => c.nextStepIndex));
      const globalStepName = orderedStepNames[globalStepIndex];
      const runningCount = candidates.filter((c) => c.nextStepName === globalStepName && c.runStatus === 'running').length;
      const queuedCount = candidates.filter((c) => c.nextStepName === globalStepName && c.runStatus !== 'running').length;
      const phaseLabel = phaseLabelByStep[globalStepName] || globalStepName;

      globalPhaseStatusEl.classList.add('global-phase-active');
      globalPhaseStatusEl.textContent = `Fase global ativa: ${phaseLabel} | running ${runningCount} | queued ${queuedCount}`;
    }

    function mapStepStatus(rawStatus, runStatus = '') {
      const normalized = String(rawStatus || '').trim().toLowerCase();
      const normalizedRunStatus = String(runStatus || '').trim().toLowerCase();

      if (normalized === 'queued' || (normalized === 'pending' && normalizedRunStatus === 'queued')) {
        return { label: 'Queued', className: 'status-queued' };
      }

      if (!normalized || normalized === 'pending' || normalized === 'discovered') {
        return { label: 'Not started', className: 'status-not-started' };
      }

      if (normalized === 'running' || normalized === 'stopping') {
        return { label: 'Running', className: 'status-running' };
      }

      if (normalized === 'success' || normalized === 'completed' || normalized === 'done') {
        return { label: 'Completed', className: 'status-completed' };
      }

      if (normalized === 'failed' || normalized === 'error') {
        return { label: 'Error', className: 'status-error' };
      }

      if (normalized === 'stopped') {
        return { label: 'Stopped', className: 'status-stopped' };
      }

      if (normalized === 'skipped') {
        return { label: 'Skipped', className: 'status-skipped' };
      }

      return { label: 'Unknown', className: 'status-unknown' };
    }

      const thumbAttrs = canPreviewThumb

        : '';
      const originalLanguageHtml = renderTitleLine('Idioma original', formatOriginalLanguage(item.original_language));

      const fileIconsHtml = `<span class="file-icons">${icons.join('')}</span>`;
      const editButtonHtml = tab === TAB_LIBRARY
        ? `<button type="button" class="edit-launch" data-edit-id="${item.id}" aria-label="Editar item">✎</button>`
        : '';
      const checkedAttr = selectionSetForTab(tab).has(Number(item.id)) ? ' checked' : '';

      return `
        <td class="select-col"><div class="select-cell"><input type="checkbox" class="row-check" data-id="${item.id}"${checkedAttr}><img class="${thumbClass}" src="${escapeHtml(thumbnailUrl)}" alt="Thumbnail" ${thumbAttrs}></div></td>
        <td class="file-cell"><div class="file-cell-wrap"><div class="file-head">${fileIconsHtml}<div class="file-name">${escapeHtml(item.file_name)}</div></div>${originalLanguageHtml}${durationHtml}${youtubeTitleOriginalHtml}${youtubeTitlePtBrHtml}${sourceUrlHtml}${editButtonHtml}</div></td>
      `;

    function renderPipelinePanel() {
      syncPager(TAB_PIPELINE);
      pipelineTbody.innerHTML = pageItems(TAB_PIPELINE).map(item => {
        const run = item.latest_run;
        const runStatus = run?.status || '';
        const stepMap = buildDisplayStepMap(run);
        const downloadStatus = mapStepStatus(stepMap.download, runStatus);
        const extractStatus = mapStepStatus(stepMap.extract, runStatus);
        const transcribeStatus = mapStepStatus(stepMap.transcribe, runStatus);
        const translateStatus = mapStepStatus(stepMap.translate, runStatus);
        const audiobookStatus = mapStepStatus(stepMap.audiobook, runStatus);
        const remuxStatus = mapStepStatus(stepMap.remux, runStatus);
        const statuses = {
          download: downloadStatus,
          extract: extractStatus,
          transcribe: transcribeStatus,
          translate: translateStatus,
          audiobook: audiobookStatus,
          remux: remuxStatus
        };
        const phasePercentSnapshot = phasePercentByItem.get(item.id) || computePhasePercentSnapshot(statuses, run?.progress_by_step || null);
        const phaseTimelineHtml = renderPhaseTimeline({
          download: downloadStatus,
          extract: extractStatus,
          transcribe: transcribeStatus,
          translate: translateStatus,
          audiobook: audiobookStatus,
          remux: remuxStatus
        }, phasePercentSnapshot);
        const logActions = run?.log_url
          ? `<a href="${run.log_url}" target="_blank" rel="noopener noreferrer">Log</a> <button type="button" class="tail-link" data-log-url="${run.log_url}" data-file-name="${escapeHtml(item.file_name)}">Tail</button>`
          : '-';

        return `
          <tr>
            ${renderFileCell(item)}
            <td>${phaseTimelineHtml}</td>
            <td class="mono">${logActions}</td>
          </tr>
        `;
      }).join('');

      pipelinePanel.querySelectorAll('.row-check').forEach((el) => {
        el.addEventListener('change', () => {
          const itemId = Number(el.dataset.id);
          const selection = selectionSetForTab(TAB_PIPELINE);
          if (el.checked) {
            selection.add(itemId);
          } else {
            selection.delete(itemId);
          }
          updateHint(TAB_PIPELINE);
        });
      });
      pipelinePanel.querySelectorAll('.tail-link').forEach(el => el.addEventListener('click', () => showLogTail(el.dataset.logUrl, el.dataset.fileName)));
      pipelinePanel.querySelectorAll('.video-thumb-clickable').forEach((el) => {
        el.addEventListener('click', () => openThumbOverlay(el.dataset.previewSrc, el.dataset.fileName));
      });
      updateHint(TAB_PIPELINE);
    }

    function renderLibraryPanel() {
      syncPager(TAB_LIBRARY);
      libraryTbody.innerHTML = pageItems(TAB_LIBRARY).map(item => `
        <tr>
          ${renderFileCell(item, TAB_LIBRARY)}
        </tr>
      `).join('');

      libraryPanel.querySelectorAll('.row-check').forEach((el) => {
        el.addEventListener('change', () => {
          const itemId = Number(el.dataset.id);
          const selection = selectionSetForTab(TAB_LIBRARY);
          if (el.checked) {
            selection.add(itemId);
          } else {
            selection.delete(itemId);
          }
          updateHint(TAB_LIBRARY);
        });
      });
      libraryPanel.querySelectorAll('.video-thumb-clickable').forEach((el) => {
        el.addEventListener('click', () => openThumbOverlay(el.dataset.previewSrc, el.dataset.fileName));
      });
      libraryPanel.querySelectorAll('.edit-launch').forEach((el) => {
        el.addEventListener('click', () => openEditOverlay(Number(el.dataset.editId)));
      });
      updateHint(TAB_LIBRARY);
    }

    function renderTabState() {
      const isPipeline = currentTab === TAB_PIPELINE;
      pipelineTabBtn.classList.toggle('is-active', isPipeline);
      libraryTabBtn.classList.toggle('is-active', !isPipeline);
      pipelineTabBtn.setAttribute('aria-selected', String(isPipeline));
      libraryTabBtn.setAttribute('aria-selected', String(!isPipeline));
      pipelinePanel.hidden = !isPipeline;
      libraryPanel.hidden = isPipeline;
    }

    function render() {
      renderTabState();
      renderPipelinePanel();
      renderLibraryPanel();
      renderGlobalPhaseStatusFromItems(itemsForTab(TAB_PIPELINE));
    }

    function renderWorkerStatus(worker) {
      workerStatusEl.classList.remove('worker-online', 'worker-offline', 'worker-unknown');

      if (!worker || typeof worker.running !== 'boolean') {
        workerStatusEl.classList.add('worker-unknown');
        workerStatusEl.textContent = 'Worker: unknown';
        return;
      }

      const queue = worker.queue || {};
      const queued = Number(queue.queued || 0);
      const running = Number(queue.running || 0);
      const scopeCounts = worker.worker_scope_counts || {};
      const expectedPerScope = worker.expected_worker_slots_per_scope || {};
      const coordinator = worker.coordinator_running ? 'on' : 'off';
      const scopeLabel = {
        download: 'DL',
        extract: 'EX',
        transcribe: 'TR',
        translate: 'TL',
        audiobook: 'AB',
        remux: 'RX'
      };
      const phaseSummary = Object.entries(scopeLabel).map(([scope, label]) => {
        const active = Number(scopeCounts[scope] || 0);
        const expected = Number(expectedPerScope[scope] || 0);
        return expected > 0 ? `${label}:${active}/${expected}` : `${label}:${active}`;
      }).join(' ');
      const suffix = ` | coord: ${coordinator} | ${phaseSummary} | queue: ${queued} | running: ${running}`;

      if (worker.running) {
        workerStatusEl.classList.add('worker-online');
        workerStatusEl.textContent = `Worker: online${suffix}`;
      } else {
        workerStatusEl.classList.add('worker-offline');
        workerStatusEl.textContent = `Worker: offline${suffix}`;
      }
    }

    function formatDiscoveryTimestamp(value) {
      if (!value) return '';
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) {
        return String(value).replace('T', ' ').replace(/\.\d+.*$/, '');
      }
      const pad = (num) => String(num).padStart(2, '0');
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
    }

    function renderDiscoveryStatus(discovery) {
      discoveryStatusEl.classList.remove('discovery-running', 'discovery-done', 'discovery-idle');

      if (discovery && discovery.in_progress) {
        discoveryStatusEl.classList.add('discovery-running');
        discoveryStatusEl.textContent = 'Scanning: In progress';
        return;
      }

      const formatted = formatDiscoveryTimestamp(discovery?.last_completed_at || '');
      if (formatted) {
        discoveryStatusEl.classList.add('discovery-done');
        discoveryStatusEl.textContent = `Last discovery on ${formatted}`;
        return;
      }

      discoveryStatusEl.classList.add('discovery-idle');
      discoveryStatusEl.textContent = 'Last discovery: never';
    }

    async function loadStatus(includeLogTail = false, options = {}) {
      const {silent = false} = options;
      const statusUrl = includeLogTail ? '/api/status?include_log_tail=true' : '/api/status';

      try {
        const [statusRes, workerRes] = await Promise.all([
          fetch(statusUrl),
          fetch('/api/worker-status')
        ]);

        if (!statusRes.ok) {
          throw new Error(`status request failed (${statusRes.status})`);
        }
        if (!workerRes.ok) {
          throw new Error(`worker-status request failed (${workerRes.status})`);
        }

        const statusData = await statusRes.json();
        const workerData = await workerRes.json();
        const nextItems = Array.isArray(statusData.items) ? statusData.items : [];
        items = nextItems;
        syncSelectionWithItems();

        if (includeLogTail) {
          phasePercentByItem.clear();
        }
        items.forEach((item) => {
          const run = item?.latest_run;
          const runStatus = run?.status || '';
          const stepMap = buildDisplayStepMap(run);
          const statuses = {
            download: mapStepStatus(stepMap.download, runStatus),
            extract: mapStepStatus(stepMap.extract, runStatus),
            transcribe: mapStepStatus(stepMap.transcribe, runStatus),
            translate: mapStepStatus(stepMap.translate, runStatus),
            audiobook: mapStepStatus(stepMap.audiobook, runStatus),
            remux: mapStepStatus(stepMap.remux, runStatus)
          };
          phasePercentByItem.set(item.id, computePhasePercentSnapshot(statuses, run?.progress_by_step || null));
        });

        renderWorkerStatus(workerData.worker || null);
        renderDiscoveryStatus(statusData.discovery || null);
        render();
        return true;
      } catch (error) {
        if (!silent) {
          console.warn('Falha ao carregar status:', error);
        }
        return false;
      }
    }

    function autoScanIntervalMs() {
      const seconds = Number(autoRefreshSelect.value || 0);
      return Number.isFinite(seconds) && seconds > 0 ? seconds * 1000 : 0;
    }

    function clearAutoScanTimer() {
      if (autoScanTimer) {
        window.clearTimeout(autoScanTimer);
        autoScanTimer = null;
      }
    }

    function clearStatusPollTimer() {
      if (statusPollTimer) {
        window.clearTimeout(statusPollTimer);
        statusPollTimer = null;
      }
    }

    function scheduleAutoScan() {
      clearAutoScanTimer();
      const intervalMs = autoScanIntervalMs();
      if (!intervalMs) {
        return;
      }
      autoScanTimer = window.setTimeout(runAutoScanTick, intervalMs);
    }

    function scheduleStatusPoll() {
      clearStatusPollTimer();
      statusPollTimer = window.setTimeout(runStatusPollTick, STATUS_POLL_INTERVAL_MS);
    }

    async function runStatusPollTick() {
      if (statusPollInFlight || autoScanInFlight) {
        scheduleStatusPoll();
        return;
      }

      statusPollInFlight = true;
      try {
        await loadStatus(false, {silent: true});
      } finally {
        statusPollInFlight = false;
        scheduleStatusPoll();
      }
    }

    async function runAutoScanTick() {
      if (autoScanInFlight) {
        scheduleAutoScan();
        return;
      }

      autoScanInFlight = true;
      try {
        await fetch('/api/scan', {method: 'POST'});
        await loadStatus(true);
      } catch (error) {
        // Ignore transient polling failures and keep the timer alive.
      } finally {
        autoScanInFlight = false;
        scheduleAutoScan();
      }
    }

    document.getElementById('scanBtn').addEventListener('click', async () => {
      renderDiscoveryStatus({in_progress: true});
      await fetch('/api/scan', {method: 'POST'});
      await loadStatus(true);
      scheduleAutoScan();
    });

    document.getElementById('runBtn').addEventListener('click', async () => {
      const ids = selectedIds(TAB_PIPELINE);
      if (!ids.length) return;
      await fetch('/api/runs/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({video_ids: ids})
      });
      await loadStatus(false);
    });

    document.getElementById('addBtn').addEventListener('click', openDownloadOverlay);

    deleteBtn.addEventListener('click', async () => {
      const ids = selectedIds(TAB_PIPELINE);
      if (!ids.length) return;
      if (!window.confirm(`Excluir ${ids.length} linha(s) selecionada(s)?`)) {
        return;
      }

      const response = await fetch('/api/videos/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({video_ids: ids})
      });

      if (!response.ok) {
        const payload = await response.json().catch(() => null);
        const detail = payload?.error || `Falha ao excluir linhas (${response.status}).`;
        window.alert(detail);
        return;
      }

      await loadStatus(false);
    });

    libraryDeleteBtn.addEventListener('click', async () => {
      const ids = selectedIds(TAB_LIBRARY);
      if (!ids.length) return;
      if (!window.confirm(`Excluir ${ids.length} linha(s) selecionada(s)?`)) {
        return;
      }

      const response = await fetch('/api/videos/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({video_ids: ids})
      });

      if (!response.ok) {
        const payload = await response.json().catch(() => null);
        const detail = payload?.error || `Falha ao excluir linhas (${response.status}).`;
        window.alert(detail);
        return;
      }

      await loadStatus(false);
    });

    restoreBtn.addEventListener('click', async () => {
      const ids = selectedIds(TAB_LIBRARY);
      if (!ids.length) return;

      const response = await fetch('/api/videos/restore', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({video_ids: ids})
      });

      if (!response.ok) {
        const payload = await response.json().catch(() => null);
        const detail = payload?.error || `Falha ao restaurar linhas (${response.status}).`;
        window.alert(detail);
        return;
      }

      await loadStatus(false);
    });

    libraryRefreshBtn.addEventListener('click', async () => {
      const ids = selectedIds(TAB_LIBRARY);
      if (!ids.length) return;

      libraryRefreshBtn.disabled = true;
      let shouldReload = true;
      try {
        const response = await fetch('/api/videos/refresh-titles', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({video_ids: ids})
        });

        if (!response.ok) {
          const payload = await response.json().catch(() => null);
          const detail = payload?.error || `Falha ao atualizar titulos (${response.status}).`;
          window.alert(detail);
          shouldReload = false;
          return;
        }

        const payload = await response.json().catch(() => null);
        const refreshed = Number(payload?.result?.refreshed || 0);
        const skipped = Number(payload?.result?.skipped || 0);
        const failed = Number(payload?.result?.failed || 0);
        window.alert(`Titulos atualizados: ${refreshed}. Ignorados: ${skipped}. Falhas: ${failed}.`);
      } catch (error) {
        shouldReload = false;
        const message = String(error?.message || error || 'Falha ao atualizar titulos.');
        window.alert(message);
      } finally {
        libraryRefreshBtn.disabled = false;
      }
      if (shouldReload) {
        await loadStatus(true);
      }
    });

    async function submitDownload() {
      const sourceUrl = String(downloadUrl.value || '').trim();
      if (!sourceUrl) {
        downloadError.textContent = 'Informe o link do YouTube.';
        downloadUrl.focus();
        return;
      }

      downloadError.textContent = '';
      downloadOk.disabled = true;
      try {
        const response = await fetch('/api/downloads/add', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({source_url: sourceUrl})
        });
        const responseText = await response.text();
        let payload = null;

        if (responseText) {
          try {
            payload = JSON.parse(responseText);
          } catch (error) {
            payload = null;
          }
        }

        if (!response.ok || !payload || !payload.ok) {
          const detail = payload?.error || responseText.trim() || `Request failed (${response.status})`;
          throw new Error(detail);
        }
        closeDownloadOverlay();
        await loadStatus(false);
      } catch (error) {
        const message = String(error?.message || error || 'Falha ao adicionar o download.');
        downloadError.textContent = message.includes('Request failed (')
          ? message
          : `Falha ao adicionar o download: ${message}`;
      } finally {
        downloadOk.disabled = false;
      }
    }

    downloadOk.addEventListener('click', submitDownload);
    downloadCancel.addEventListener('click', closeDownloadOverlay);
    downloadClose.addEventListener('click', closeDownloadOverlay);
    downloadUrl.addEventListener('keydown', (evt) => {
      if (evt.key === 'Enter') {
        evt.preventDefault();
        submitDownload();
      }
    });
    downloadOverlay.addEventListener('click', (evt) => {
      if (evt.target === downloadOverlay) {
        closeDownloadOverlay();
      }
    });

    document.getElementById('stopBtn').addEventListener('click', async () => {
      const ids = selectedIds(TAB_PIPELINE);
      if (!ids.length) return;
      await fetch('/api/runs/stop', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({video_ids: ids})
      });
      await loadStatus(false);
    });

    pipelineAll.addEventListener('change', () => {
      const selection = selectionSetForTab(TAB_PIPELINE);
      pipelinePanel.querySelectorAll('.row-check').forEach((el) => {
        const itemId = Number(el.dataset.id);
        el.checked = pipelineAll.checked;
        if (pipelineAll.checked) {
          selection.add(itemId);
        } else {
          selection.delete(itemId);
        }
      });
      updateHint(TAB_PIPELINE);
    });

    libraryAll.addEventListener('change', () => {
      const selection = selectionSetForTab(TAB_LIBRARY);
      libraryPanel.querySelectorAll('.row-check').forEach((el) => {
        const itemId = Number(el.dataset.id);
        el.checked = libraryAll.checked;
        if (libraryAll.checked) {
          selection.add(itemId);
        } else {
          selection.delete(itemId);
        }
      });
      updateHint(TAB_LIBRARY);
    });

    pipelinePageSizeEl.addEventListener('change', () => {
      currentPageByTab[TAB_PIPELINE] = 1;
      renderPipelinePanel();
    });

    libraryPageSizeEl.addEventListener('change', () => {
      currentPageByTab[TAB_LIBRARY] = 1;
      renderLibraryPanel();
    });

    pipelinePrevPageBtn.addEventListener('click', () => {
      if (currentPageByTab[TAB_PIPELINE] <= 1) return;
      currentPageByTab[TAB_PIPELINE] -= 1;
      renderPipelinePanel();
    });

    pipelineNextPageBtn.addEventListener('click', () => {
      if (currentPageByTab[TAB_PIPELINE] >= totalPages(TAB_PIPELINE)) return;
      currentPageByTab[TAB_PIPELINE] += 1;
      renderPipelinePanel();
    });

    libraryPrevPageBtn.addEventListener('click', () => {
      if (currentPageByTab[TAB_LIBRARY] <= 1) return;
      currentPageByTab[TAB_LIBRARY] -= 1;
      renderLibraryPanel();
    });

    libraryNextPageBtn.addEventListener('click', () => {
      if (currentPageByTab[TAB_LIBRARY] >= totalPages(TAB_LIBRARY)) return;
      currentPageByTab[TAB_LIBRARY] += 1;
      renderLibraryPanel();
    });

    autoRefreshSelect.addEventListener('change', () => {
      scheduleAutoScan();
    });

    pipelineTabBtn.addEventListener('click', () => {
      currentTab = TAB_PIPELINE;
      renderTabState();
    });

    libraryTabBtn.addEventListener('click', () => {
      currentTab = TAB_LIBRARY;
      renderTabState();
    });

    logTailClose.addEventListener('click', closeLogTailOverlay);
    logTailOverlay.addEventListener('click', (evt) => {
      if (evt.target === logTailOverlay) {
        closeLogTailOverlay();
      }
    });
    document.addEventListener('keydown', (evt) => {
      if (evt.key === 'Escape' && !logTailOverlay.hidden) {
        closeLogTailOverlay();
      }
      if (evt.key === 'Escape' && !downloadOverlay.hidden) {
        closeDownloadOverlay();
      }
      if (evt.key === 'Escape' && !thumbOverlay.hidden) {
        closeThumbOverlay();
      }
      if (evt.key === 'Escape' && !editOverlay.hidden) {
        closeEditOverlay();
      }
    });

    thumbClose.addEventListener('click', closeThumbOverlay);
    thumbOverlay.addEventListener('click', (evt) => {
      if (evt.target === thumbOverlay) {
        closeThumbOverlay();
      }
    });

    editClose.addEventListener('click', closeEditOverlay);
    editCancel.addEventListener('click', closeEditOverlay);
    editSave.addEventListener('click', saveEditOverlay);
    clearYoutubeUrl.addEventListener('click', () => { editYoutubeUrl.value = ''; editYoutubeUrl.focus(); });
    clearTitleOriginal.addEventListener('click', () => { editTitleOriginal.value = ''; editTitleOriginal.focus(); });
    clearTitlePtBr.addEventListener('click', () => { editTitlePtBr.value = ''; editTitlePtBr.focus(); });
    editOverlay.addEventListener('click', (evt) => {
      if (evt.target === editOverlay) {
        closeEditOverlay();
      }
    });

    loadStatus(true, {silent: false}).finally(() => {
      scheduleAutoScan();
      scheduleStatusPoll();
    });
  </script>
</body>
</html>
