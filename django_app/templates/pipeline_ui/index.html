{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pipeline Local Webapp</title>
  <style>
    body { margin: 0; font-family: "Segoe UI", Arial, sans-serif; background: #f4f7f8; color: #173026; }
    .container { width: min(1280px, 96vw); margin: 18px auto; }
    .top { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 12px; }
    .btn { border: 0; border-radius: 8px; padding: 9px 12px; font-weight: 700; cursor: pointer; }
    .scan { background: #d8e7ff; color: #1f3c7f; }
    .add { background: #f1dfb6; color: #6d4a00; }
    .delete { background: #f8d9d6; color: #8a2318; }
    .run { background: #117a62; color: #fff; }
    .stop { background: #b5382b; color: #fff; }
    .worker-pill { border-radius: 999px; padding: 5px 10px; font-size: .82rem; font-weight: 700; border: 1px solid #c6dcd3; background: #e9f4ef; color: #2c584a; }
    .worker-online { background: #d9f5e8; color: #13613f; border-color: #97d7bb; }
    .worker-offline { background: #ffe5e1; color: #8a2318; border-color: #efb3ab; }
    .worker-unknown { background: #f3f4f6; color: #4f5962; border-color: #d6d9de; }
    .hint { margin-left: auto; font-size: .9rem; color: #49655c; }
    table { width: 100%; border-collapse: collapse; background: #fff; border: 1px solid #d6e2dd; }
    th, td { border-bottom: 1px solid #e2ece8; padding: 12px 9px; text-align: left; vertical-align: top; font-size: .88rem; }
    th { background: #edf6f3; position: sticky; top: 0; }
    .phase-col { min-width: 360px; }
    .select-col { width: 150px; min-width: 150px; }
    .select-cell { display: flex; align-items: center; gap: 8px; }
    .video-thumb {
      width: 96px;
      height: 54px;
      object-fit: cover;
      border-radius: 6px;
      border: 1px solid #ccd9e2;
      background: #eef3f7;
      flex-shrink: 0;
    }
    .video-thumb-clickable { cursor: zoom-in; transition: transform .12s ease, box-shadow .12s ease; }
    .video-thumb-clickable:hover { transform: scale(1.03); box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18); }
    .file-cell { min-width: 360px; }
    .file-head { display: flex; align-items: center; gap: 8px; }
    .file-icons { display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .file-icon { width: 16px; height: 16px; display: inline-block; vertical-align: middle; }
    .file-name { font-size: .94rem; font-weight: 700; color: #173026; }
    .title-line { margin-top: 4px; text-align: left; line-height: 1.4; }
    .title-label { font-weight: 700; color: #335348; }
    .title-text { color: #29473d; }
    .status-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: .74rem;
      font-weight: 700;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    .status-not-started { background: #f1f5f9; border-color: #cbd5e1; color: #334155; }
    .status-queued { background: #eaf2ff; border-color: #bfd7ff; color: #1d4e89; }
    .status-running { background: #fff4db; border-color: #f8d9a0; color: #7c4a03; }
    .status-completed { background: #e7f8ee; border-color: #b7e4c7; color: #166534; }
    .status-error { background: #fdecec; border-color: #f5b8b8; color: #991b1b; }
    .status-stopped { background: #f3e8ff; border-color: #d8b4fe; color: #6b21a8; }
    .status-skipped { background: #eef2f7; border-color: #d3dae6; color: #475569; }
    .status-unknown { background: #ff8a1f; border-color: #d66a00; color: #ffffff; }
    .phase-track { display: flex; align-items: flex-start; gap: 0; min-width: 320px; padding-top: 2px; }
    .phase-step { position: relative; flex: 1 1 0; display: flex; flex-direction: column; align-items: center; gap: 6px; text-align: center; }
    .phase-step:not(:last-child)::after {
      content: "";
      position: absolute;
      top: 8px;
      left: calc(50% + 12px);
      right: calc(-50% + 12px);
      height: 2px;
      background: #d5dfdb;
      z-index: 0;
    }
    .phase-step.is-completed:not(:last-child)::after { background: #77c89a; }
    .phase-step.is-error:not(:last-child)::after { background: #ef9a9a; }
    .phase-step.is-running:not(:last-child)::after {
      background: linear-gradient(90deg, #f2c267 0%, #f7d99e 50%, #d5dfdb 100%);
    }
    .phase-dot {
      position: relative;
      z-index: 1;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid #b7c6c1;
      background: #ffffff;
      box-sizing: border-box;
    }
    .phase-step.is-not-started .phase-dot { background: #ffffff; border-color: #cbd5e1; }
    .phase-step.is-queued .phase-dot { background: #d9e9ff; border-color: #7fb1ff; }
    .phase-step.is-running .phase-dot {
      background: #ffd37f;
      border-color: #d89114;
      box-shadow: 0 0 0 0 rgba(216, 145, 20, 0.45);
      animation: phase-pulse 1.5s infinite;
    }
    .phase-step.is-completed .phase-dot { background: #34b56a; border-color: #239150; }
    .phase-step.is-error .phase-dot { background: #e66a6a; border-color: #ba3f3f; }
    .phase-step.is-stopped .phase-dot { background: #b788f7; border-color: #8854d0; }
    .phase-step.is-skipped .phase-dot { background: #dbe4ea; border-color: #aab7c5; }
    .phase-step.is-unknown .phase-dot { background: #ff8a1f; border-color: #d66a00; }
    .phase-label { font-size: .66rem; font-weight: 700; color: #486258; letter-spacing: .02em; line-height: 1.15; }
    .phase-step.is-running .phase-label { color: #7c4a03; }
    .phase-summary { margin-top: 8px; font-size: .76rem; color: #49655c; }
    @keyframes phase-pulse {
      0% { box-shadow: 0 0 0 0 rgba(216, 145, 20, 0.45); }
      70% { box-shadow: 0 0 0 8px rgba(216, 145, 20, 0); }
      100% { box-shadow: 0 0 0 0 rgba(216, 145, 20, 0); }
    }
    select { width: 100%; border: 1px solid #c1d2cc; border-radius: 7px; padding: 5px; font-size: .8rem; background: #fff; }
    .mono { font-family: ui-monospace, Menlo, monospace; font-size: .8rem; color: #4a5f58; }
    .translate-mode-note {
      margin-top: 6px;
      display: inline-block;
      padding: 3px 7px;
      border-radius: 999px;
      font-size: .7rem;
      font-weight: 700;
      border: 1px solid #cfe0da;
      background: #eef7f3;
      color: #1f4f40;
      white-space: nowrap;
    }
    .translate-mode-note.warn {
      border-color: #f1c27c;
      background: #fff5e8;
      color: #8c4c09;
    }
    .tail-link { color: #1f5b99; text-decoration: underline; cursor: pointer; background: none; border: 0; padding: 0; font: inherit; }
    .overlay[hidden] { display: none; }
    .overlay { position: fixed; inset: 0; background: rgba(10, 20, 24, 0.52); display: flex; align-items: center; justify-content: center; padding: 24px; z-index: 1000; }
    .overlay-card { width: min(920px, 94vw); max-height: 82vh; background: #fff; border-radius: 14px; border: 1px solid #cfe0da; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.22); display: flex; flex-direction: column; }
    .overlay-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; border-bottom: 1px solid #dde9e4; }
    .overlay-title { font-size: .95rem; font-weight: 700; color: #173026; }
    .overlay-close { border: 0; background: #eef5f2; color: #173026; border-radius: 8px; padding: 7px 10px; cursor: pointer; font-weight: 700; }
    .overlay-body { padding: 0; overflow: auto; }
    .overlay-body.image-preview { padding: 12px; background: #f6faf8; display: flex; justify-content: center; }
    .preview-image { display: block; max-width: min(1200px, 92vw); max-height: 80vh; width: auto; height: auto; border-radius: 10px; border: 1px solid #d3e1db; background: #ffffff; }
    .overlay-pre { margin: 0; padding: 16px; font-family: ui-monospace, Menlo, monospace; font-size: .82rem; line-height: 1.45; white-space: pre-wrap; color: #203a31; background: #fbfdfc; }
    .download-form { padding: 16px; display: grid; gap: 10px; }
    .download-form label { font-size: .84rem; font-weight: 700; color: #335348; }
    .download-form input { width: 100%; box-sizing: border-box; border: 1px solid #c7d6d0; border-radius: 10px; padding: 11px 12px; font-size: .92rem; }
    .download-actions { display: flex; justify-content: flex-end; gap: 8px; }
    .download-ok { background: #117a62; color: #fff; }
    .download-cancel { background: #e8eeec; color: #29473d; }
    .download-error { min-height: 1.2em; font-size: .82rem; color: #a61b1b; }
    .pager { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
    .pager-info { font-size: .88rem; color: #49655c; }
    .pager-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .pager-actions select { width: auto; min-width: 88px; }
    .btn.pager-btn { background: #edf6f3; color: #26483d; padding: 8px 10px; }
    .btn.pager-btn[disabled] { opacity: .5; cursor: default; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Pipeline Local Webapp</h2>
    <div class="top">
      <button class="btn scan" id="scanBtn">Refresh</button>
      <button class="btn run" id="runBtn">Start</button>
      <button class="btn add" id="addBtn">Add</button>
      <button class="btn delete" id="deleteBtn">Delete</button>
      <button class="btn stop" id="stopBtn">Stop</button>
      <span class="worker-pill worker-unknown" id="workerStatus">Worker: unknown</span>
      <span class="hint" id="hint">Selected: 0</span>
    </div>

    <div style="overflow:auto; max-height: 78vh; border:1px solid #d6e2dd;">
      <table>
        <thead>
          <tr>
            <th><input type="checkbox" id="all"></th>
            <th>File</th>
            <th class="phase-col">Phases</th>
            <th>Translate</th>
            <th>Logs</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <div class="pager">
      <div class="pager-info" id="pagerInfo">0 registros</div>
      <div class="pager-actions">
        <label for="pageSize">Por pagina</label>
        <select id="pageSize">
          <option value="10">10</option>
          <option value="25" selected>25</option>
          <option value="50">50</option>
          <option value="100">100</option>
        </select>
        <button class="btn pager-btn" id="prevPageBtn" type="button">Prev</button>
        <span class="pager-info" id="pageIndicator">Pagina 1 de 1</span>
        <button class="btn pager-btn" id="nextPageBtn" type="button">Next</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="logTailOverlay" hidden>
    <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="logTailTitle">
      <div class="overlay-head">
        <div class="overlay-title" id="logTailTitle">Log tail</div>
        <button class="overlay-close" id="logTailClose" type="button">Close</button>
      </div>
      <div class="overlay-body">
        <pre class="overlay-pre" id="logTailContent">Loading...</pre>
      </div>
    </div>
  </div>

  <div class="overlay" id="downloadOverlay" hidden>
    <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="downloadTitle">
      <div class="overlay-head">
        <div class="overlay-title" id="downloadTitle">Add YouTube link</div>
        <button class="overlay-close" id="downloadClose" type="button">Cancel</button>
      </div>
      <div class="overlay-body">
        <div class="download-form">
          <div>
            <label for="downloadUrl">YouTube link</label>
            <input id="downloadUrl" type="url" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" spellcheck="false">
          </div>
          <div class="download-error" id="downloadError"></div>
          <div class="download-actions">
            <button class="btn download-cancel" id="downloadCancel" type="button">Cancel</button>
            <button class="btn download-ok" id="downloadOk" type="button">OK</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="thumbOverlay" hidden>
    <div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="thumbTitle">
      <div class="overlay-head">
        <div class="overlay-title" id="thumbTitle">Thumbnail</div>
        <button class="overlay-close" id="thumbClose" type="button">Close</button>
      </div>
      <div class="overlay-body image-preview">
        <img id="thumbPreviewImage" class="preview-image" alt="Thumbnail preview">
      </div>
    </div>
  </div>

  <script>
    const tbody = document.getElementById('tbody');
    const hint = document.getElementById('hint');
    const all = document.getElementById('all');
    const workerStatusEl = document.getElementById('workerStatus');
    const logTailOverlay = document.getElementById('logTailOverlay');
    const logTailTitle = document.getElementById('logTailTitle');
    const logTailContent = document.getElementById('logTailContent');
    const logTailClose = document.getElementById('logTailClose');
    const downloadOverlay = document.getElementById('downloadOverlay');
    const downloadUrl = document.getElementById('downloadUrl');
    const downloadError = document.getElementById('downloadError');
    const downloadClose = document.getElementById('downloadClose');
    const downloadCancel = document.getElementById('downloadCancel');
    const downloadOk = document.getElementById('downloadOk');
    const thumbOverlay = document.getElementById('thumbOverlay');
    const thumbTitle = document.getElementById('thumbTitle');
    const thumbClose = document.getElementById('thumbClose');
    const thumbPreviewImage = document.getElementById('thumbPreviewImage');
    const deleteBtn = document.getElementById('deleteBtn');
    const pageSizeEl = document.getElementById('pageSize');
    const prevPageBtn = document.getElementById('prevPageBtn');
    const nextPageBtn = document.getElementById('nextPageBtn');
    const pageIndicator = document.getElementById('pageIndicator');
    const pagerInfo = document.getElementById('pagerInfo');
    const iconPaths = {
      disk: '{% static "pipeline_ui/icons/hdd-fill.svg" %}',
      youtube: '{% static "pipeline_ui/icons/youtube.svg" %}',
      warning: '{% static "pipeline_ui/icons/exclamation-triangle-fill.svg" %}'
    };

    let items = [];
    let currentPage = 1;

    function pageSize() {
      return Number(pageSizeEl.value || 25);
    }

    function totalPages() {
      return Math.max(1, Math.ceil(items.length / pageSize()));
    }

    function pageItems() {
      const size = pageSize();
      const start = (currentPage - 1) * size;
      return items.slice(start, start + size);
    }

    function syncPager() {
      const total = items.length;
      const pages = totalPages();
      if (currentPage > pages) {
        currentPage = pages;
      }
      if (currentPage < 1) {
        currentPage = 1;
      }

      const start = total === 0 ? 0 : ((currentPage - 1) * pageSize()) + 1;
      const end = total === 0 ? 0 : Math.min(currentPage * pageSize(), total);
      pagerInfo.textContent = `${total} registros | exibindo ${start}-${end}`;
      pageIndicator.textContent = `Pagina ${currentPage} de ${pages}`;
      prevPageBtn.disabled = currentPage <= 1;
      nextPageBtn.disabled = currentPage >= pages;
    }

    function selectedIds() {
      return Array.from(document.querySelectorAll('.row-check:checked')).map(el => Number(el.dataset.id));
    }

    function updateHint() {
      const sel = selectedIds();
      hint.textContent = `Selected: ${sel.length}`;
      const total = document.querySelectorAll('.row-check').length;
      all.checked = total > 0 && sel.length === total;
      all.indeterminate = sel.length > 0 && sel.length < total;
    }

    function statusBadge(label, className) {
      return `<span class="status-badge ${className}">${label}</span>`;
    }

    function phaseStateClass(className) {
      return String(className || '').replace(/^status-/, 'is-') || 'is-unknown';
    }

    function renderPhaseTimeline(statuses) {
      const steps = [
        { key: 'download', label: 'DL', title: 'Download' },
        { key: 'extract', label: 'EX', title: 'Extract' },
        { key: 'transcribe', label: 'TR', title: 'Transcribe' },
        { key: 'translate', label: 'TL', title: 'Translate' },
        { key: 'audiobook', label: 'AB', title: 'Audiobook' },
        { key: 'remux', label: 'RX', title: 'Remux' }
      ];
      const runningStep = steps.find((step) => statuses[step.key]?.className === 'status-running');
      const summary = runningStep
        ? `Em execucao: ${runningStep.title}`
        : steps.find((step) => statuses[step.key]?.className === 'status-error')
          ? 'Ha fase com erro'
          : steps.every((step) => statuses[step.key]?.className === 'status-completed' || statuses[step.key]?.className === 'status-skipped')
            ? 'Fluxo concluido'
            : 'Aguardando proxima fase';

      const timeline = steps.map((step) => {
        const state = statuses[step.key] || { label: 'Unknown', className: 'status-unknown' };
        const stateClass = phaseStateClass(state.className);
        return `<div class="phase-step ${stateClass}" title="${step.title}: ${state.label}"><span class="phase-dot"></span><span class="phase-label">${step.label}</span></div>`;
      }).join('');

      return `<div class="phase-track">${timeline}</div><div class="phase-summary">${summary}</div>`;
    }

    function renderTitleLine(label, text) {
      const normalized = String(text || '').trim();
      if (!normalized) {
        return '';
      }
      return `<div class="title-line"><span class="title-label">${escapeHtml(label)}:</span> <span class="title-text">${escapeHtml(normalized)}</span></div>`;
    }

    function formatOriginalLanguage(value) {
      const raw = String(value || '').trim();
      if (!raw) {
        return '(Desconhecido)';
      }

      const lower = raw.toLowerCase();
      if (lower === 'auto' || lower === 'unknown') {
        return '(Desconhecido)';
      }

      return raw;
    }

    function renderFileIcons(item) {
      const icons = [];
      if (String(item.source_url || '').trim()) {
        icons.push(`<img class="file-icon" src="${iconPaths.youtube}" alt="YouTube" title="Origem YouTube">`);
      } else {
        icons.push(`<img class="file-icon" src="${iconPaths.disk}" alt="Disco" title="Origem disco">`);
      }

      if (!item.is_present) {
        icons.push(`<img class="file-icon" src="${iconPaths.warning}" alt="Ausente" title="Arquivo ausente no disco">`);
      }

      return `<span class="file-icons">${icons.join('')}</span>`;
    }

    function selectField(videoId, key, value, options) {
      const opts = options.map((option) => {
        const optionValue = typeof option === 'string' ? option : option.value;
        const optionLabel = typeof option === 'string' ? option : option.label;
        return `<option value="${optionValue}" ${String(value) === String(optionValue) ? 'selected' : ''}>${optionLabel}</option>`;
      }).join('');
      return `<select data-id="${videoId}" data-key="${key}" class="opt">${opts}</select>`;
    }

    function openDownloadOverlay() {
      downloadError.textContent = '';
      downloadUrl.value = '';
      downloadOverlay.hidden = false;
      window.setTimeout(() => downloadUrl.focus(), 0);
    }

    function closeDownloadOverlay() {
      downloadOverlay.hidden = true;
      downloadError.textContent = '';
      downloadUrl.value = '';
    }

    function openThumbOverlay(src, fileName) {
      thumbTitle.textContent = `Thumbnail: ${fileName}`;
      thumbPreviewImage.src = src;
      thumbPreviewImage.alt = `Thumbnail ${fileName}`;
      thumbOverlay.hidden = false;
    }

    function closeThumbOverlay() {
      thumbOverlay.hidden = true;
      thumbPreviewImage.removeAttribute('src');
      thumbPreviewImage.alt = 'Thumbnail preview';
      thumbTitle.textContent = 'Thumbnail';
    }

    function translateOptionValue(profile) {
      if (profile.backend === 'libretranslate') {
        return 'google';
      }

      if (profile.backend === 'nllb_local') {
        if (profile.nllb_legacy || profile.nllb_profile === 'legacy') {
          return 'nllb_legacy';
        }
        if (profile.nllb_profile === 'custom') {
          return 'nllb_custom';
        }
        return 'nllb_fast';
      }

      if (profile.backend === 'deepl_doc') {
        return profile.deepl_endpoint === 'pro' ? 'deepl_pro' : 'deepl_free';
      }

      return profile.backend;
    }

    function translateModeNote(profile, run) {
      const backend = String(profile?.backend || '').toLowerCase();
      const endpoint = String(profile?.deepl_endpoint || 'free').toLowerCase();
      const logTail = String(run?.log_tail || '').toLowerCase();

      if (backend !== 'deepl_doc') {
        return '';
      }

      if (logTail.includes('[deepl_fallback_exhausted_keys]')) {
        return '<div class="translate-mode-note warn">DeepL exhausted: Google fallback active</div>';
      }

      const endpointLabel = endpoint === 'pro' ? 'pro' : 'free';
      return `<div class="translate-mode-note">DeepL (${endpointLabel}) with key rotation</div>`;
    }

    function escapeHtml(text) {
      return String(text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function lastLogLines(text, count = 20) {
      const lines = String(text || '').replace(/\r\n/g, '\n').split('\n');
      const trimmed = lines.filter((line, index, arr) => !(index === arr.length - 1 && line === ''));
      return trimmed.slice(-count).join('\n') || 'Log is empty.';
    }

    function openLogTailOverlay(title, content) {
      logTailTitle.textContent = title;
      logTailContent.textContent = content;
      logTailOverlay.hidden = false;
    }

    function closeLogTailOverlay() {
      logTailOverlay.hidden = true;
      logTailTitle.textContent = 'Log tail';
      logTailContent.textContent = '';
    }

    async function showLogTail(logUrl, fileName) {
      openLogTailOverlay(`Last 20 lines: ${fileName}`, 'Loading...');

      try {
        const response = await fetch(logUrl);
        if (!response.ok) {
          throw new Error(`Failed to load log (${response.status})`);
        }
        const text = await response.text();
        logTailContent.textContent = lastLogLines(text, 20);
      } catch (error) {
        logTailContent.textContent = `Could not load the log.\n${error.message}`;
      }
    }

    function buildDisplayStepMap(run) {
      const orderedStepNames = ['download', 'extract', 'transcribe', 'translate', 'audiobook', 'remux'];
      const stepMap = new Map();

      (run?.steps || []).forEach((step) => {
        stepMap.set(step.step_name, step.status || 'pending');
      });

      return Object.fromEntries(orderedStepNames.map((stepName) => [stepName, stepMap.get(stepName) || 'pending']));
    }

    function mapStepStatus(rawStatus, runStatus = '') {
      const normalized = String(rawStatus || '').trim().toLowerCase();
      const normalizedRunStatus = String(runStatus || '').trim().toLowerCase();

      if (normalized === 'queued' || (normalized === 'pending' && normalizedRunStatus === 'queued')) {
        return { label: 'Queued', className: 'status-queued' };
      }

      if (!normalized || normalized === 'pending' || normalized === 'discovered') {
        return { label: 'Not started', className: 'status-not-started' };
      }

      if (normalized === 'running' || normalized === 'stopping') {
        return { label: 'Running', className: 'status-running' };
      }

      if (normalized === 'success' || normalized === 'completed' || normalized === 'done') {
        return { label: 'Completed', className: 'status-completed' };
      }

      if (normalized === 'failed' || normalized === 'error') {
        return { label: 'Error', className: 'status-error' };
      }

      if (normalized === 'stopped') {
        return { label: 'Stopped', className: 'status-stopped' };
      }

      if (normalized === 'skipped') {
        return { label: 'Skipped', className: 'status-skipped' };
      }

      return { label: 'Unknown', className: 'status-unknown' };
    }

    function render() {
      syncPager();
      tbody.innerHTML = pageItems().map(item => {
        const run = item.latest_run;
        const profile = item.profile;
        const translateNoteHtml = translateModeNote(profile, run);
        const runStatus = run?.status || '';
        const stepMap = buildDisplayStepMap(run);
        const downloadStatus = mapStepStatus(stepMap.download, runStatus);
        const extractStatus = mapStepStatus(stepMap.extract, runStatus);
        const transcribeStatus = mapStepStatus(stepMap.transcribe, runStatus);
        const translateStatus = mapStepStatus(stepMap.translate, runStatus);
        const audiobookStatus = mapStepStatus(stepMap.audiobook, runStatus);
        const remuxStatus = mapStepStatus(stepMap.remux, runStatus);
        const phaseTimelineHtml = renderPhaseTimeline({
          download: downloadStatus,
          extract: extractStatus,
          transcribe: transcribeStatus,
          translate: translateStatus,
          audiobook: audiobookStatus,
          remux: remuxStatus
        });
        const sourceUrlHtml = item.source_url ? `<div class="mono">${escapeHtml(item.source_url)}</div>` : '';
        const thumbnailUrl = item.thumbnail_url || `/api/videos/${item.id}/thumbnail`;
        const canPreviewThumb = Boolean(item.has_real_thumbnail);
        const thumbClass = canPreviewThumb ? 'video-thumb video-thumb-clickable' : 'video-thumb';
        const thumbAttrs = canPreviewThumb
          ? `data-preview-src="${escapeHtml(thumbnailUrl)}" data-file-name="${escapeHtml(item.file_name)}"`
          : '';
        const originalLanguageHtml = renderTitleLine('Idioma original', formatOriginalLanguage(item.original_language));
        const youtubeTitleOriginalHtml = renderTitleLine('Original', item.youtube_title_original);
        const youtubeTitlePtBrHtml = renderTitleLine('PT-BR', item.youtube_title_pt_br);
        const fileIconsHtml = renderFileIcons(item);
        const logActions = run?.log_url
          ? `<a href="${run.log_url}" target="_blank" rel="noopener noreferrer">Log</a> <button type="button" class="tail-link" data-log-url="${run.log_url}" data-file-name="${escapeHtml(item.file_name)}">Tail</button>`
          : '-';

        const translateHtml = selectField(item.id, 'translate', translateOptionValue(profile), [
          // { value: 'libretranslate', label: 'LibreTranslate (local)' },
          { value: 'google', label: 'Google' },
          { value: 'nllb_fast', label: 'NLLB - Fast' },
          { value: 'nllb_legacy', label: 'NLLB - Legacy' },
          { value: 'nllb_custom', label: 'NLLB - Custom' },
          { value: 'gemini', label: 'Gemini' },
          { value: 'deepl_free', label: 'DeepL (free)' },
          { value: 'deepl_pro', label: 'DeepL (pro)' }
        ]);

        return `
          <tr>
            <td class="select-col"><div class="select-cell"><input type="checkbox" class="row-check" data-id="${item.id}"><img class="${thumbClass}" src="${escapeHtml(thumbnailUrl)}" alt="Thumbnail" ${thumbAttrs}></div></td>
            <td class="file-cell"><div class="file-head">${fileIconsHtml}<div class="file-name">${escapeHtml(item.file_name)}</div></div>${originalLanguageHtml}${youtubeTitleOriginalHtml}${youtubeTitlePtBrHtml}${sourceUrlHtml}</td>
            <td>${phaseTimelineHtml}</td>
            <td>${translateHtml}${translateNoteHtml}</td>
            <td class="mono">${logActions}</td>
          </tr>
        `;
      }).join('');

      document.querySelectorAll('.row-check').forEach(el => el.addEventListener('change', updateHint));
      document.querySelectorAll('.opt').forEach(el => el.addEventListener('change', onOptionChange));
      document.querySelectorAll('.tail-link').forEach(el => el.addEventListener('click', () => showLogTail(el.dataset.logUrl, el.dataset.fileName)));
      document.querySelectorAll('.video-thumb-clickable').forEach((el) => {
        el.addEventListener('click', () => openThumbOverlay(el.dataset.previewSrc, el.dataset.fileName));
      });
      updateHint();
    }

    function renderWorkerStatus(worker) {
      workerStatusEl.classList.remove('worker-online', 'worker-offline', 'worker-unknown');

      if (!worker || typeof worker.running !== 'boolean') {
        workerStatusEl.classList.add('worker-unknown');
        workerStatusEl.textContent = 'Worker: unknown';
        return;
      }

      const queue = worker.queue || {};
      const queued = Number(queue.queued || 0);
      const running = Number(queue.running || 0);
      const suffix = ` | queue: ${queued} | running: ${running}`;

      if (worker.running) {
        workerStatusEl.classList.add('worker-online');
        workerStatusEl.textContent = `Worker: online${suffix}`;
      } else {
        workerStatusEl.classList.add('worker-offline');
        workerStatusEl.textContent = `Worker: offline${suffix}`;
      }
    }

    async function loadStatus(includeLogTail = false) {
      const statusUrl = includeLogTail ? '/api/status?include_log_tail=true' : '/api/status';
      const [statusRes, workerRes] = await Promise.all([
        fetch(statusUrl),
        fetch('/api/worker-status')
      ]);
      const statusData = await statusRes.json();
      const workerData = await workerRes.json();
      items = statusData.items || [];
      currentPage = Math.min(currentPage, totalPages());
      renderWorkerStatus(workerData.worker || null);
      render();
    }

    async function onOptionChange(evt) {
      const id = Number(evt.target.dataset.id);
      const key = evt.target.dataset.key;
      let value = evt.target.value;

      if (key === 'translate') {
        const payload = {};

        if (value === 'deepl_free') {
          payload.backend = 'deepl_doc';
          payload.deepl_endpoint = 'free';
        } else if (value === 'deepl_pro') {
          payload.backend = 'deepl_doc';
          payload.deepl_endpoint = 'pro';
        } else if (value === 'nllb_fast') {
          payload.backend = 'nllb_local';
          payload.nllb_profile = 'fast';
          payload.nllb_legacy = false;
        } else if (value === 'nllb_legacy') {
          payload.backend = 'nllb_local';
          payload.nllb_profile = 'legacy';
          payload.nllb_legacy = true;
        } else if (value === 'nllb_custom') {
          payload.backend = 'nllb_local';
          payload.nllb_profile = 'custom';
          payload.nllb_legacy = false;
        } else {
          payload.backend = value;
        }

        await fetch(`/api/videos/${id}/options`, {
          method: 'PATCH',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(payload)
        });
        return;
      }

      await fetch(`/api/videos/${id}/options`, {
        method: 'PATCH',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({[key]: value})
      });
    }

    document.getElementById('scanBtn').addEventListener('click', async () => {
      await fetch('/api/scan', {method: 'POST'});
      await loadStatus(true);
    });

    document.getElementById('runBtn').addEventListener('click', async () => {
      const ids = selectedIds();
      if (!ids.length) return;
      await fetch('/api/runs/start', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({video_ids: ids})
      });
      await loadStatus(false);
    });

    document.getElementById('addBtn').addEventListener('click', openDownloadOverlay);

    deleteBtn.addEventListener('click', async () => {
      const ids = selectedIds();
      if (!ids.length) return;
      if (!window.confirm(`Excluir ${ids.length} linha(s) selecionada(s)?`)) {
        return;
      }

      const response = await fetch('/api/videos/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({video_ids: ids})
      });

      if (!response.ok) {
        const payload = await response.json().catch(() => null);
        const detail = payload?.error || `Falha ao excluir linhas (${response.status}).`;
        window.alert(detail);
        return;
      }

      await loadStatus(false);
    });

    async function submitDownload() {
      const sourceUrl = String(downloadUrl.value || '').trim();
      if (!sourceUrl) {
        downloadError.textContent = 'Informe o link do YouTube.';
        downloadUrl.focus();
        return;
      }

      downloadError.textContent = '';
      downloadOk.disabled = true;
      try {
        const response = await fetch('/api/downloads/add', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({source_url: sourceUrl})
        });
        const responseText = await response.text();
        let payload = null;

        if (responseText) {
          try {
            payload = JSON.parse(responseText);
          } catch (error) {
            payload = null;
          }
        }

        if (!response.ok || !payload || !payload.ok) {
          const detail = payload?.error || responseText.trim() || `Request failed (${response.status})`;
          throw new Error(detail);
        }
        closeDownloadOverlay();
        await loadStatus(false);
      } catch (error) {
        const message = String(error?.message || error || 'Falha ao adicionar o download.');
        downloadError.textContent = message.includes('Request failed (')
          ? message
          : `Falha ao adicionar o download: ${message}`;
      } finally {
        downloadOk.disabled = false;
      }
    }

    downloadOk.addEventListener('click', submitDownload);
    downloadCancel.addEventListener('click', closeDownloadOverlay);
    downloadClose.addEventListener('click', closeDownloadOverlay);
    downloadUrl.addEventListener('keydown', (evt) => {
      if (evt.key === 'Enter') {
        evt.preventDefault();
        submitDownload();
      }
    });
    downloadOverlay.addEventListener('click', (evt) => {
      if (evt.target === downloadOverlay) {
        closeDownloadOverlay();
      }
    });

    document.getElementById('stopBtn').addEventListener('click', async () => {
      const ids = selectedIds();
      if (!ids.length) return;
      await fetch('/api/runs/stop', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({video_ids: ids})
      });
      await loadStatus(false);
    });

    all.addEventListener('change', () => {
      document.querySelectorAll('.row-check').forEach(el => el.checked = all.checked);
      updateHint();
    });

    pageSizeEl.addEventListener('change', () => {
      currentPage = 1;
      render();
    });

    prevPageBtn.addEventListener('click', () => {
      if (currentPage <= 1) return;
      currentPage -= 1;
      render();
    });

    nextPageBtn.addEventListener('click', () => {
      if (currentPage >= totalPages()) return;
      currentPage += 1;
      render();
    });

    logTailClose.addEventListener('click', closeLogTailOverlay);
    logTailOverlay.addEventListener('click', (evt) => {
      if (evt.target === logTailOverlay) {
        closeLogTailOverlay();
      }
    });
    document.addEventListener('keydown', (evt) => {
      if (evt.key === 'Escape' && !logTailOverlay.hidden) {
        closeLogTailOverlay();
      }
      if (evt.key === 'Escape' && !downloadOverlay.hidden) {
        closeDownloadOverlay();
      }
      if (evt.key === 'Escape' && !thumbOverlay.hidden) {
        closeThumbOverlay();
      }
    });

    thumbClose.addEventListener('click', closeThumbOverlay);
    thumbOverlay.addEventListener('click', (evt) => {
      if (evt.target === thumbOverlay) {
        closeThumbOverlay();
      }
    });

    loadStatus(false);
  </script>
</body>
</html>
